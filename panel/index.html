<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workpilot Agent — Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <audio
      id="notif-sound"
      preload="auto"
      src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
    ></audio>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #0f1117;
        --card: #1a1d27;
        --border: #2a2d3a;
        --primary: #3b82f6;
        --text: #f1f5f9;
        --muted: #64748b;
        --green: #22c55e;
        --red: #ef4444;
        --amber: #f59e0b;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }
      #login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .login-box {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 2.5rem;
        width: 100%;
        max-width: 380px;
      }
      .login-logo {
        font-size: 1.8rem;
        margin-bottom: 0.5rem;
      }
      .login-box h1 {
        font-size: 1.4rem;
        margin-bottom: 0.3rem;
      }
      .login-box p {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 2rem;
      }
      input,
      select {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 0.7rem 0.9rem;
        border-radius: 8px;
        font-size: 0.875rem;
        margin-bottom: 0.75rem;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus,
      select:focus {
        border-color: var(--primary);
      }
      button {
        background: var(--primary);
        color: white;
        border: none;
        padding: 0.65rem 1.2rem;
        border-radius: 8px;
        font-size: 0.875rem;
        cursor: pointer;
        transition: opacity 0.2s;
        font-weight: 500;
      }
      button:hover {
        opacity: 0.85;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button.secondary {
        background: var(--border);
      }
      .error-msg {
        color: var(--red);
        font-size: 0.78rem;
        margin-top: 0.5rem;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.2);
        border-radius: 6px;
        padding: 0.5rem 0.75rem;
      }
      #app {
        display: none;
      }
      header {
        background: var(--card);
        border-bottom: 1px solid var(--border);
        padding: 0 1.5rem;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      header h1 {
        font-size: 0.95rem;
        font-weight: 600;
      }
      .negocio-badge {
        background: rgba(59, 130, 246, 0.15);
        color: var(--primary);
        font-size: 0.78rem;
        padding: 3px 10px;
        border-radius: 99px;
        font-weight: 500;
      }
      .main-layout {
        display: flex;
        height: calc(100vh - 56px);
      }
      .sidebar {
        width: 270px;
        background: var(--card);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-header {
        padding: 0.875rem 1rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .sidebar-header span {
        font-size: 0.75rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
      }
      .sidebar-header .count {
        background: var(--border);
        color: var(--muted);
        font-size: 0.7rem;
        padding: 1px 7px;
        border-radius: 99px;
      }
      .conv-list {
        overflow-y: auto;
        flex: 1;
      }
      .conv-item {
        padding: 0.875rem 1rem;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        transition: background 0.15s;
      }
      .conv-item:hover {
        background: rgba(255, 255, 255, 0.04);
      }
      .conv-item.active {
        background: rgba(59, 130, 246, 0.08);
        border-left: 3px solid var(--primary);
      }
      .conv-item .phone {
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 3px;
      }
      .conv-item .last-msg {
        font-size: 0.75rem;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 210px;
      }
      .conv-item .time {
        font-size: 0.68rem;
        color: var(--muted);
        float: right;
        margin-top: 2px;
      }
      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--bg);
      }
      .chat-header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border);
        background: var(--card);
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      .chat-header .phone {
        font-weight: 600;
        font-size: 0.9rem;
      }
      .chat-header .since {
        font-size: 0.75rem;
        color: var(--muted);
      }
      .chat-empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .msg-group {
        display: flex;
        flex-direction: column;
      }
      .msg {
        max-width: 60%;
        padding: 0.6rem 0.9rem;
        border-radius: 12px;
        font-size: 0.875rem;
        line-height: 1.5;
        white-space: pre-wrap;
      }
      .msg.cliente {
        background: var(--card);
        border: 1px solid var(--border);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }
      .msg.agente {
        background: var(--primary);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }
      .msg-time {
        font-size: 0.65rem;
        color: var(--muted);
        margin-top: 3px;
      }
      .msg.agente ~ .msg-time {
        text-align: right;
      }
      .right-panel {
        width: 320px;
        background: var(--card);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
      }
      .tab {
        flex: 1;
        padding: 0.75rem 0.5rem;
        text-align: center;
        font-size: 0.78rem;
        color: var(--muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        font-weight: 500;
      }
      .tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
      }
      .tab-content {
        display: none;
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
      }
      .tab-content.active {
        display: block;
      }
      .metric-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }
      .metric-card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.875rem;
      }
      .metric-card .label {
        font-size: 0.68rem;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .metric-card .value {
        font-size: 1.5rem;
        font-weight: 700;
      }
      .section-label {
        font-size: 0.7rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
        font-weight: 600;
      }
      .producto-item {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.75rem;
        margin-bottom: 0.5rem;
      }
      .producto-item .nombre {
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 5px;
      }
      .producto-item .detalle {
        font-size: 0.75rem;
        color: var(--muted);
        display: flex;
        gap: 0.75rem;
        align-items: center;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 99px;
        font-size: 0.68rem;
        font-weight: 600;
      }
      .badge.green {
        background: rgba(34, 197, 94, 0.15);
        color: var(--green);
      }
      .badge.red {
        background: rgba(239, 68, 68, 0.15);
        color: var(--red);
      }
      .badge.amber {
        background: rgba(245, 158, 11, 0.15);
        color: var(--amber);
      }
      .empty {
        text-align: center;
        color: var(--muted);
        font-size: 0.85rem;
        padding: 2rem 1rem;
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
      }
      label {
        font-size: 0.75rem;
        color: var(--muted);
        display: block;
        margin-bottom: 3px;
      }
      .form-group {
        margin-bottom: 0.75rem;
      }
      .form-box {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.875rem;
        margin-bottom: 1rem;
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <!-- LOGIN -->
    <div id="login-screen">
      <div class="login-box">
        <div class="login-logo">🤖</div>
        <h1>Workpilot Agent</h1>
        <p>Ingresá con tu cuenta para acceder al panel</p>
        <div class="form-group">
          <label>Email</label>
          <input
            type="email"
            id="login-email"
            placeholder="tu@email.com"
            onkeydown="if (event.key === 'Enter') iniciarSesion();"
          />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input
            type="password"
            id="login-pass"
            placeholder="••••••••"
            onkeydown="if (event.key === 'Enter') iniciarSesion();"
          />
        </div>
        <button onclick="iniciarSesion()" id="btn-login" style="width: 100%">
          Ingresar
        </button>
        <div id="login-error" style="display: none" class="error-msg"></div>
      </div>
    </div>

    <!-- APP -->
    <div id="app">
      <header>
        <div class="header-left">
          <h1>🤖 Workpilot Agent</h1>
          <span class="negocio-badge" id="header-negocio">—</span>
        </div>
        <div style="display: flex; align-items: center; gap: 0.75rem">
          <span
            style="font-size: 0.8rem; color: var(--muted)"
            id="header-email"
          ></span>
          <button
            id="btn-notif"
            onclick="toggleSonido()"
            style="
              padding: 0.35rem 0.85rem;
              font-size: 0.8rem;
              background: var(--border);
              color: var(--muted);
            "
          >
            🔕 Sonido inactivo
          </button>
          <button
            class="secondary"
            onclick="cerrarSesion()"
            style="padding: 0.35rem 0.85rem; font-size: 0.8rem"
          >
            Salir
          </button>
        </div>
      </header>

      <div class="main-layout">
        <div class="sidebar">
          <div class="sidebar-header">
            <span>Conversaciones</span>
            <span class="count" id="conv-count">0</span>
          </div>
          <div class="conv-list" id="conv-list">
            <div class="empty">Sin conversaciones todavía</div>
          </div>
        </div>

        <div class="chat-area" id="chat-area">
          <div class="chat-empty">
            Seleccioná una conversación para ver los mensajes
          </div>
        </div>

        <div class="right-panel">
          <div class="tabs">
            <div class="tab active" onclick="switchTab('metricas', this)">
              Métricas
            </div>
            <div class="tab" onclick="switchTab('catalogo', this)">
              Catálogo
            </div>
            <div class="tab" onclick="switchTab('config', this)">Config</div>
          </div>

          <div class="tab-content active" id="tab-metricas">
            <div class="metric-grid">
              <div class="metric-card">
                <div class="label">Hoy</div>
                <div class="value" id="m-hoy">—</div>
              </div>
              <div class="metric-card">
                <div class="label">Conversaciones</div>
                <div class="value" id="m-conv">—</div>
              </div>
              <div class="metric-card">
                <div class="label">Esta semana</div>
                <div class="value" id="m-semana">—</div>
              </div>
              <div class="metric-card">
                <div class="label">Total</div>
                <div class="value" id="m-total">—</div>
              </div>
            </div>
            <div class="section-label">Últimas consultas</div>
            <div id="ultimas-consultas"><div class="empty">Sin datos</div></div>
          </div>

          <div class="tab-content" id="tab-catalogo">
            <button
              onclick="mostrarFormProducto()"
              style="width: 100%; margin-bottom: 1rem"
            >
              + Agregar producto
            </button>
            <div class="form-box" id="form-producto" style="display: none">
              <input type="hidden" id="prod-id" />
              <div class="form-group">
                <label>Nombre del producto</label
                ><input
                  type="text"
                  id="prod-nombre"
                  placeholder="Ej: Látex blanco 4L"
                />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Precio ($)</label
                  ><input type="number" id="prod-precio" placeholder="0" />
                </div>
                <div class="form-group">
                  <label>Stock</label
                  ><input type="number" id="prod-stock" placeholder="0" />
                </div>
              </div>
              <div class="form-group">
                <label>Categoría</label
                ><input
                  type="text"
                  id="prod-categoria"
                  placeholder="Ej: Látex interior"
                />
              </div>
              <div style="display: flex; gap: 0.5rem">
                <button onclick="guardarProducto()" style="flex: 1">
                  Guardar
                </button>
                <button class="secondary" onclick="cancelarFormProducto()">
                  Cancelar
                </button>
              </div>
            </div>
            <div id="catalogo-list"><div class="empty">Sin productos</div></div>
          </div>

          <div class="tab-content" id="tab-config">
            <div class="form-group">
              <label>Horario de atención</label
              ><input
                type="text"
                id="cfg-horario"
                placeholder="Lunes a Viernes 8-18hs"
              />
            </div>
            <div class="form-group">
              <label>Mensaje de bienvenida</label
              ><input
                type="text"
                id="cfg-bienvenida"
                placeholder="¡Hola! ¿Cuál es su consulta?"
              />
            </div>
            <div class="form-group">
              <label>Mensaje fuera de horario</label
              ><input
                type="text"
                id="cfg-fuera-horario"
                placeholder="Estamos cerrados..."
              />
            </div>
            <div class="form-group">
              <label>Teléfono para derivar consultas</label
              ><input
                type="text"
                id="cfg-telefono"
                placeholder="011-XXXX-XXXX"
              />
            </div>
            <button onclick="guardarConfig()" style="width: 100%">
              Guardar configuración
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      const SUPABASE_URL = "https://iujmvqaphikdissinlbu.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml1am12cWFwaGlrZGlzc2lubGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODAyNjIsImV4cCI6MjA5ODA1NjI2Mn0.51LyU-fEnxcXVTbKFdf0wE9IGTZKyPwsrVz35pebbOg";
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      let negocioActual = null;
      let conversacionActual = null;
      let sonidoActivado = false;
      let ultimaCantMensajes = 0;

      // ── Sonido ────────────────────────────────────────────────────────────────
      function toggleSonido() {
        const audio = document.getElementById("notif-sound");
        const btn = document.getElementById("btn-notif");

        if (!sonidoActivado) {
          audio
            .play()
            .then(() => {
              audio.pause();
              audio.currentTime = 0;
              sonidoActivado = true;
              btn.textContent = "🔔 Sonido activo";
              btn.style.background = "rgba(34,197,94,0.2)";
              btn.style.color = "var(--green)";
            })
            .catch(() => {
              alert("No se pudo activar el sonido. Intentá de nuevo.");
            });
        } else {
          sonidoActivado = false;
          btn.textContent = "🔕 Sonido inactivo";
          btn.style.background = "var(--border)";
          btn.style.color = "var(--muted)";
        }
      }

      function reproducirNotificacion() {
        if (!sonidoActivado) return;
        const audio = document.getElementById("notif-sound");
        audio.currentTime = 0;
        audio.play().catch((e) => console.log("Error reproduciendo:", e));
      }

      // ── Auth ──────────────────────────────────────────────────────────────────
      async function iniciarSesion() {
        const email = document.getElementById("login-email").value.trim();
        const pass = document.getElementById("login-pass").value;
        const btn = document.getElementById("btn-login");
        const errEl = document.getElementById("login-error");

        errEl.style.display = "none";
        btn.disabled = true;
        btn.textContent = "Ingresando...";

        const { data, error } = await sb.auth.signInWithPassword({
          email,
          password: pass,
        });

        if (error) {
          errEl.textContent = "Email o contraseña incorrectos";
          errEl.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Ingresar";
          return;
        }

        document.getElementById("header-email").textContent = email;
        await cargarNegocioDelUsuario(data.user.id);
      }

      async function cargarNegocioDelUsuario(userId) {
        const { data } = await sb
          .from("usuarios_negocio")
          .select("negocio_id, negocios(nombre)")
          .eq("user_id", userId)
          .single();

        if (!data) {
          document.getElementById("login-error").textContent =
            "No tenés ningún negocio asignado.";
          document.getElementById("login-error").style.display = "block";
          document.getElementById("btn-login").disabled = false;
          document.getElementById("btn-login").textContent = "Ingresar";
          return;
        }

        negocioActual = data.negocio_id;
        document.getElementById("header-negocio").textContent =
          data.negocios.nombre;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").style.display = "block";

        await Promise.all([
          cargarConversaciones(),
          cargarMetricas(),
          cargarCatalogo(),
          cargarConfig(),
        ]);
      }

      async function cerrarSesion() {
        await sb.auth.signOut();
        location.reload();
      }

      window.addEventListener("load", async () => {
        const { data } = await sb.auth.getSession();
        if (data?.session?.user) {
          document.getElementById("header-email").textContent =
            data.session.user.email;
          await cargarNegocioDelUsuario(data.session.user.id);
        }
      });

      setInterval(() => {
        if (negocioActual) {
          cargarConversaciones();
          cargarMetricas();
        }
      }, 10000);

      // ── Conversaciones ────────────────────────────────────────────────────────
      async function cargarConversaciones() {
        const { data } = await sb
          .from("conversaciones")
          .select(
            "id, telefono_cliente, updated_at, mensajes(contenido, created_at, rol)",
          )
          .eq("negocio_id", negocioActual)
          .order("updated_at", { ascending: false });

        const list = document.getElementById("conv-list");
        document.getElementById("conv-count").textContent = data?.length || 0;

        if (!data || data.length === 0) {
          list.innerHTML =
            '<div class="empty">Sin conversaciones todavía</div>';
          ultimaCantMensajes = 0;
          return;
        }

        const totalMensajes = data.reduce(
          (acc, c) => acc + (c.mensajes?.length || 0),
          0,
        );
        if (ultimaCantMensajes > 0 && totalMensajes > ultimaCantMensajes) {
          reproducirNotificacion();
        }
        ultimaCantMensajes = totalMensajes;

        list.innerHTML = data
          .map((c) => {
            const msgs = c.mensajes?.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at),
            );
            const ultimo = msgs?.[0];
            const tel = c.telefono_cliente.replace("whatsapp:", "");
            return `<div class="conv-item" onclick="abrirConversacion('${c.id}', '${tel}', '${c.updated_at}')" id="conv-${c.id}">
            <span class="time">${formatTiempo(c.updated_at)}</span>
            <div class="phone">${tel}</div>
            <div class="last-msg">${ultimo?.contenido || "Sin mensajes"}</div>
          </div>`;
          })
          .join("");
      }

      async function abrirConversacion(id, telefono, desde) {
        conversacionActual = id;
        document
          .querySelectorAll(".conv-item")
          .forEach((el) => el.classList.remove("active"));
        document.getElementById(`conv-${id}`)?.classList.add("active");

        const { data } = await sb
          .from("mensajes")
          .select("*")
          .eq("conversacion_id", id)
          .order("created_at", { ascending: true });

        const area = document.getElementById("chat-area");
        area.innerHTML = `
          <div class="chat-header">
            <div>
              <div class="phone">${telefono}</div>
              <div class="since">Desde ${new Date(desde).toLocaleDateString("es-AR")}</div>
            </div>
          </div>
          <div class="messages" id="messages"></div>
        `;

        const container = document.getElementById("messages");
        if (!data || data.length === 0) {
          container.innerHTML = '<div class="empty">Sin mensajes</div>';
          return;
        }

        container.innerHTML = data
          .map(
            (m) => `
          <div class="msg-group">
            <div class="msg ${m.rol}">${m.contenido}</div>
            <div class="msg-time">${formatTiempo(m.created_at)}</div>
          </div>
        `,
          )
          .join("");

        container.scrollTop = container.scrollHeight;
      }

      // ── Métricas ──────────────────────────────────────────────────────────────
      async function cargarMetricas() {
        const hoy = new Date();
        hoy.setHours(0, 0, 0, 0);
        const semana = new Date();
        semana.setDate(semana.getDate() - 7);

        const { count: totalConv } = await sb
          .from("conversaciones")
          .select("*", { count: "exact", head: true })
          .eq("negocio_id", negocioActual);

        const { data: convIds } = await sb
          .from("conversaciones")
          .select("id")
          .eq("negocio_id", negocioActual);

        const ids = convIds?.map((c) => c.id) || [];

        if (ids.length === 0) {
          ["m-hoy", "m-conv", "m-semana", "m-total"].forEach(
            (id) => (document.getElementById(id).textContent = 0),
          );
          return;
        }

        const { count: msgsHoy } = await sb
          .from("mensajes")
          .select("*", { count: "exact", head: true })
          .in("conversacion_id", ids)
          .eq("rol", "cliente")
          .gte("created_at", hoy.toISOString());
        const { count: msgsSemana } = await sb
          .from("mensajes")
          .select("*", { count: "exact", head: true })
          .in("conversacion_id", ids)
          .eq("rol", "cliente")
          .gte("created_at", semana.toISOString());
        const { count: msgsTotal } = await sb
          .from("mensajes")
          .select("*", { count: "exact", head: true })
          .in("conversacion_id", ids)
          .eq("rol", "cliente");

        document.getElementById("m-hoy").textContent = msgsHoy || 0;
        document.getElementById("m-conv").textContent = totalConv || 0;
        document.getElementById("m-semana").textContent = msgsSemana || 0;
        document.getElementById("m-total").textContent = msgsTotal || 0;

        const { data: ultimas } = await sb
          .from("mensajes")
          .select("contenido, created_at")
          .in("conversacion_id", ids)
          .eq("rol", "cliente")
          .order("created_at", { ascending: false })
          .limit(5);

        const container = document.getElementById("ultimas-consultas");
        if (!ultimas || ultimas.length === 0) {
          container.innerHTML = '<div class="empty">Sin consultas aún</div>';
          return;
        }

        container.innerHTML = ultimas
          .map(
            (m) => `
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:0.6rem 0.75rem;margin-bottom:0.4rem;">
            <div style="font-size:0.82rem;margin-bottom:3px;">${m.contenido}</div>
            <div style="font-size:0.68rem;color:var(--muted);">${formatTiempo(m.created_at)}</div>
          </div>
        `,
          )
          .join("");
      }

      // ── Catálogo ──────────────────────────────────────────────────────────────
      async function cargarCatalogo() {
        const { data } = await sb
          .from("productos")
          .select("*")
          .eq("negocio_id", negocioActual)
          .eq("activo", true)
          .order("categoria");
        const container = document.getElementById("catalogo-list");
        if (!data || data.length === 0) {
          container.innerHTML =
            '<div class="empty">Sin productos cargados</div>';
          return;
        }
        container.innerHTML = data
          .map(
            (p) => `
          <div class="producto-item">
            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:4px;">
              <div class="nombre">${p.nombre}</div>
              <button onclick='editarProducto(${JSON.stringify(p).replace(/'/g, "&#39;")})' style="padding:2px 8px;font-size:0.7rem;background:var(--border);">✏️</button>
            </div>
            <div class="detalle">
              <span>$${Number(p.precio).toLocaleString("es-AR")}</span>
              <span class="badge ${p.stock > 3 ? "green" : p.stock > 0 ? "amber" : "red"}">${p.stock > 0 ? p.stock + " u." : "Sin stock"}</span>
              <span>${p.categoria || "—"}</span>
            </div>
          </div>
        `,
          )
          .join("");
      }

      function mostrarFormProducto() {
        [
          "prod-id",
          "prod-nombre",
          "prod-precio",
          "prod-stock",
          "prod-categoria",
        ].forEach((id) => (document.getElementById(id).value = ""));
        document.getElementById("form-producto").style.display = "block";
      }

      function editarProducto(p) {
        document.getElementById("prod-id").value = p.id;
        document.getElementById("prod-nombre").value = p.nombre;
        document.getElementById("prod-precio").value = p.precio;
        document.getElementById("prod-stock").value = p.stock;
        document.getElementById("prod-categoria").value = p.categoria || "";
        document.getElementById("form-producto").style.display = "block";
      }

      function cancelarFormProducto() {
        document.getElementById("form-producto").style.display = "none";
      }

      async function guardarProducto() {
        const id = document.getElementById("prod-id").value;
        const payload = {
          nombre: document.getElementById("prod-nombre").value,
          precio: parseFloat(document.getElementById("prod-precio").value) || 0,
          stock: parseInt(document.getElementById("prod-stock").value) || 0,
          categoria: document.getElementById("prod-categoria").value,
          negocio_id: negocioActual,
          activo: true,
        };
        if (id) {
          await sb.from("productos").update(payload).eq("id", id);
        } else {
          await sb.from("productos").insert([payload]);
        }
        cancelarFormProducto();
        cargarCatalogo();
      }

      // ── Config ────────────────────────────────────────────────────────────────
      async function cargarConfig() {
        const { data } = await sb
          .from("configuracion")
          .select("*")
          .eq("negocio_id", negocioActual)
          .single();
        if (!data) return;
        document.getElementById("cfg-horario").value = data.horario || "";
        document.getElementById("cfg-bienvenida").value =
          data.mensaje_bienvenida || "";
        document.getElementById("cfg-fuera-horario").value =
          data.mensaje_fuera_horario || "";
        document.getElementById("cfg-telefono").value =
          data.derivar_telefono || "";
      }

      async function guardarConfig() {
        const payload = {
          horario: document.getElementById("cfg-horario").value,
          mensaje_bienvenida: document.getElementById("cfg-bienvenida").value,
          mensaje_fuera_horario:
            document.getElementById("cfg-fuera-horario").value,
          derivar_telefono: document.getElementById("cfg-telefono").value,
          negocio_id: negocioActual,
        };
        await sb
          .from("configuracion")
          .upsert(payload, { onConflict: "negocio_id" });
        alert("✅ Configuración guardada");
      }

      // ── Tabs ──────────────────────────────────────────────────────────────────
      function switchTab(nombre, el) {
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelectorAll(".tab-content")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
        document.getElementById(`tab-${nombre}`).classList.add("active");
      }

      // ── Helpers ───────────────────────────────────────────────────────────────
      function formatTiempo(iso) {
        const d = new Date(iso);
        const diff = Date.now() - d;
        if (diff < 60000) return "ahora";
        if (diff < 3600000) return Math.floor(diff / 60000) + "m";
        if (diff < 86400000) return Math.floor(diff / 3600000) + "h";
        return d.toLocaleDateString("es-AR", {
          day: "2-digit",
          month: "2-digit",
        });
      }
    </script>
  </body>
</html>
